<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="form-container">
    <h2>Inscription</h2>
    <form id="inscriptionForm" novalidate>
        
        <div class="input-group">
            <label for="nom">Nom</label>
            <input type="text" id="nom" name="nom" required>
            <span class="error-message" id="error-nom"></span>
        </div>

        <div class="input-group">
            <label for="prenom">Prénom</label>
            <input type="text" id="prenom" name="prenom" required>
            <span class="error-message" id="error-prenom"></span>
        </div>

        <div class="input-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required>
            <span class="error-message" id="error-email"></span>
        </div>

        <div class="input-group">
            <label for="password">Mot de passe</label>
            <input type="password" id="password" name="password" required>
            <span class="error-message" id="error-password"></span>
        </div>

        <div class="input-group">
            <label for="adresse">Adresse</label>
            <input type="text" id="adresse" name="adresse" required>
            <span class="error-message" id="error-adresse"></span>
        </div>

        <div class="input-group">
            <label for="postal">Code Postal</label>
            <input type="text" id="postal" name="postal" required>
            <span class="error-message" id="error-postal"></span>
        </div>

        <button type="submit">S'inscrire</button>
        <a href="connexion.html" class="link">Déjà un compte ? Se connecter</a>
    </form>
</div>

<script src="script.js"></script>
</body>
</html>
